<!doctype html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Team Haim — מערכת אימונים</title>
<link rel="icon" href="./logo_blue.png" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
:root{
  --bg:#0D0D0D; --surface:#181818; --surface-2:#222; --border:#2A2A2A;
  --gold:#C9A84C; --gold-lt:#E8C97A; --gold-pale:#FBF3DC22;
  --white:#F5F5F5; --muted:#6B6B6B;
  --success:#22C55E; --danger:#EF4444; --warning:#F59E0B;
  --navy:#13243F;
  --sidebar-w:240px;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0;background:var(--bg);color:var(--white);font-family:'Heebo',system-ui,sans-serif;font-weight:400}
button,input,select,textarea{font-family:inherit;color:inherit}
h1,h2,h3,h4{font-weight:800;margin:0 0 12px}
a{color:var(--gold-lt);text-decoration:none}
::-webkit-scrollbar{width:10px;height:10px}::-webkit-scrollbar-thumb{background:#2a2a2a;border-radius:8px}

/* layout */
.app{display:flex;min-height:100vh}
.sidebar{
  width:var(--sidebar-w);background:#111;border-inline-start:1px solid var(--border);
  position:fixed;inset-block:0;inset-inline-end:0;display:flex;flex-direction:column;
  padding:18px 14px;z-index:50;
}
.brand{display:flex;flex-direction:column;align-items:center;gap:8px;padding:8px 0 18px;border-bottom:1px solid var(--border)}
.brand img{width:96px;height:96px;object-fit:contain;border-radius:14px;background:var(--navy)}
.brand .t{font-weight:900;letter-spacing:.18em;color:var(--gold);font-size:18px}
.brand .s{font-size:12px;color:var(--muted)}
.nav{display:flex;flex-direction:column;gap:4px;margin-top:14px;flex:1}
.nav button{
  display:flex;align-items:center;gap:10px;background:transparent;border:1px solid transparent;
  color:#cfcfcf;padding:11px 12px;border-radius:10px;cursor:pointer;text-align:start;font-size:15px;font-weight:600;
}
.nav button .ico{width:22px;text-align:center;color:var(--gold)}
.nav button:hover{background:#1b1b1b;color:#fff}
.nav button.active{background:var(--gold-pale);border-color:#3a3220;color:var(--gold-lt)}
.sidebar .foot{padding-top:10px;border-top:1px solid var(--border);font-size:12px;color:var(--muted);text-align:center}
.athlete-name{color:var(--gold-lt);font-weight:700;margin-bottom:4px}

.main{flex:1;margin-inline-end:var(--sidebar-w);padding:22px 28px 80px;min-width:0}
.topbar{display:flex;align-items:center;justify-content:space-between;gap:14px;margin-bottom:18px;flex-wrap:wrap}
.topbar h1{font-size:24px;color:var(--white)}
.topbar h1 .accent{color:var(--gold)}
.btn{
  background:var(--gold);color:#1a1405;border:none;padding:10px 16px;border-radius:10px;font-weight:700;cursor:pointer;
  display:inline-flex;align-items:center;gap:8px;transition:.15s transform;
}
.btn:hover{transform:translateY(-1px)}
.btn.ghost{background:transparent;color:var(--gold-lt);border:1px solid var(--gold)}
.btn.sm{padding:6px 10px;font-size:13px;border-radius:8px}
.btn.danger{background:var(--danger);color:#fff}
.btn.muted{background:#2a2a2a;color:#ddd}
.card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:16px}
.card h3{color:var(--gold-lt);font-size:16px;margin-bottom:10px}
.row{display:flex;gap:10px;flex-wrap:wrap}
.grid{display:grid;gap:12px}
.muted{color:var(--muted);font-size:13px}
label{display:block;font-weight:600;font-size:12px;color:#bdbdbd;margin-bottom:5px}
input,select,textarea{
  width:100%;background:var(--surface-2);border:1px solid var(--border);color:var(--white);
  padding:9px 10px;border-radius:8px;font-size:14px;outline:none;transition:.15s border-color;
}
input:focus,select:focus,textarea:focus{border-color:var(--gold)}
textarea{min-height:70px;resize:vertical}
select option{background:#222;color:#fff}
.badge{display:inline-block;padding:3px 9px;border-radius:999px;font-size:12px;font-weight:700;background:var(--gold-pale);color:var(--gold-lt);border:1px solid #3a3220}
.badge.green{background:#13391c;color:#7be291;border-color:#1f5e30}
.badge.red{background:#3a1313;color:#ff8a8a;border-color:#5e2020}
.badge.gray{background:#222;color:#aaa;border-color:#333}
.badge.amber{background:#3a2c10;color:#ffc56a;border-color:#5e451c}

/* weekly */
.weekly{display:grid;grid-template-columns:repeat(7,minmax(180px,1fr));gap:10px;overflow-x:auto}
.day{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:10px;display:flex;flex-direction:column;gap:8px}
.day h4{font-size:14px;color:var(--gold);margin:0;display:flex;justify-content:space-between;align-items:center}
.day .date{font-size:11px;color:var(--muted);font-weight:400}
.sec-coach{background:#1f1d15;border:1px solid #3a3220;border-radius:8px;padding:8px}
.sec-athlete{background:#15191f;border:1px solid #25304a;border-radius:8px;padding:8px}
.sec-title{font-size:11px;color:var(--gold-lt);font-weight:700;margin-bottom:6px;letter-spacing:.05em}
.sec-athlete .sec-title{color:#9bb6ff}
.divider{height:1px;background:linear-gradient(90deg,transparent,#3a3220,transparent);margin:6px 0}
.km-badge{margin-top:auto;text-align:center;padding:8px;background:#0f0f0f;border:1px dashed #3a3220;border-radius:8px;color:var(--gold-lt);font-weight:700}
.intensity{display:flex;align-items:center;gap:8px}
.intensity input[type=range]{flex:1}
.int-num{min-width:24px;text-align:center;font-weight:700;color:var(--gold-lt)}

.weekly-summary{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-top:18px}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px;text-align:center}
.stat .v{font-size:24px;font-weight:900;color:var(--gold)}
.stat .l{font-size:12px;color:var(--muted);margin-top:4px}

/* season table */
table{width:100%;border-collapse:collapse;font-size:13px}
th,td{padding:8px 10px;border-bottom:1px solid var(--border);text-align:start}
th{color:var(--gold-lt);font-weight:700;background:#1f1f1f;position:sticky;top:0}
tbody tr:hover{background:#1d1d1d;cursor:pointer}
.cell-done{background:#13391c33}
.cell-partial{background:#3a2c1033}
.cell-miss{background:#3a131333}
.cell-rest{background:#22222233;color:#888}

/* charts */
.charts-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}
.chart-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px}
.chart-card h3{color:var(--gold-lt);font-size:14px;margin-bottom:8px}
.chart-card canvas{max-height:260px}

/* loader */
#loader{position:fixed;inset:0;background:#0008;display:none;align-items:center;justify-content:center;z-index:200}
#loader.show{display:flex}
.spin{width:46px;height:46px;border:4px solid #333;border-top-color:var(--gold);border-radius:50%;animation:sp 1s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}

/* toast */
#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#222;border:1px solid var(--border);color:#fff;padding:12px 18px;border-radius:10px;display:none;z-index:300;font-weight:600}
#toast.show{display:block}
#toast.ok{border-color:var(--success)}
#toast.err{border-color:var(--danger)}

/* modal */
.modal-bg{position:fixed;inset:0;background:#000a;display:none;align-items:center;justify-content:center;z-index:150;padding:20px}
.modal-bg.show{display:flex}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:20px;max-width:680px;width:100%;max-height:90vh;overflow:auto}

/* interval row */
.interval-row{display:grid;grid-template-columns:1fr 1fr 1fr auto;gap:6px;background:#161616;border:1px solid #2a2a2a;border-radius:8px;padding:8px;margin-bottom:6px}
.split-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:6px}
.split-grid .sp{position:relative}
.split-grid .sp .dev{position:absolute;top:2px;inset-inline-end:6px;font-size:10px;font-weight:700}
.dev.ok{color:var(--success)} .dev.bad{color:var(--danger)}

/* checks */
.checks{display:flex;flex-wrap:wrap;gap:6px}
.checks label{display:inline-flex;align-items:center;gap:5px;background:#1d1d1d;padding:5px 9px;border-radius:999px;border:1px solid #2a2a2a;cursor:pointer;font-size:12px;font-weight:600;margin:0}
.checks input{width:auto;margin:0}
.checks label.on{background:var(--gold-pale);border-color:#3a3220;color:var(--gold-lt)}

/* mobile */
@media (max-width:900px){
  .sidebar{position:relative;width:100%;flex-direction:row;align-items:center;height:auto;border-inline-start:none;border-bottom:1px solid var(--border);padding:10px;overflow-x:auto}
  .brand{flex-direction:row;border:none;padding:0 12px 0 0;gap:8px}
  .brand img{width:42px;height:42px}
  .nav{flex-direction:row;margin-top:0;gap:4px}
  .nav button{padding:8px 10px;font-size:13px;white-space:nowrap}
  .sidebar .foot{display:none}
  .main{margin-inline-end:0;padding:14px}
  .weekly{grid-template-columns:repeat(7,minmax(220px,1fr))}
  .weekly-summary{grid-template-columns:repeat(2,1fr)}
  .charts-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>

<div class="app">
  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="brand">
      <img src="./logo_blue.png" alt="Team Haim" onerror="this.style.display='none'">
      <div class="t">TEAM HAIM</div>
      <div class="s" id="athleteSidebarName">—</div>
    </div>
    <nav class="nav" id="nav">
      <button data-page="weekly"   class="active"><span class="ico">📅</span><span>שבועי</span></button>
      <button data-page="season"><span class="ico">🗓️</span><span>לוח שנה שלם</span></button>
      <button data-page="stats"><span class="ico">📈</span><span>סטטיסטיקות</span></button>
      <button data-page="goals"><span class="ico">🎯</span><span>מטרות ותחרויות</span></button>
      <button data-page="profile"><span class="ico">👤</span><span>פרופיל ספורטאי</span></button>
      <button data-page="strength"><span class="ico">💪</span><span>אימוני כוח</span></button>
      <button data-page="dynamics"><span class="ico">⚡</span><span>נתוני ריצה</span></button>
    </nav>
    <div class="foot">© Team Haim<br/>v1.0</div>
  </aside>

  <!-- MAIN -->
  <main class="main">
    <div id="page-weekly" class="page"></div>
    <div id="page-season" class="page" hidden></div>
    <div id="page-stats" class="page" hidden></div>
    <div id="page-goals" class="page" hidden></div>
    <div id="page-profile" class="page" hidden></div>
    <div id="page-strength" class="page" hidden></div>
    <div id="page-dynamics" class="page" hidden></div>
  </main>
</div>

<div id="loader"><div class="spin"></div></div>
<div id="toast"></div>
<div class="modal-bg" id="modalBg"><div class="modal" id="modalBody"></div></div>

<script>
/* ════════════════════════════════════════════════════════════════
   TEAM HAIM — per-athlete config (EDIT THESE TWO LINES PER ATHLETE)
   ════════════════════════════════════════════════════════════════ */
const APPS_SCRIPT_URL = "PASTE_YOUR_APPS_SCRIPT_WEB_APP_URL_HERE";
const ATHLETE_NAME    = "שם הספורטאי";

/* ──────────────── constants ──────────────── */
const DAY_NAMES_HE = ["ראשון","שני","שלישי","רביעי","חמישי","שישי","שבת"];
const WORKOUT_TYPES = ["פרטלק","ריצה ארוכה","אינטרוולים","טמפו","המפעלה","ריצה קלה","כוח","מנוחה","תחרות","ריצה הררית"];
const WORKOUT_ICONS = {"פרטלק":"🌀","ריצה ארוכה":"🏃","אינטרוולים":"⚡","טמפו":"💨","המפעלה":"⛰️","ריצה קלה":"🚶","כוח":"💪","מנוחה":"🌙","תחרות":"🏆","ריצה הררית":"🏔️"};
const TIGHT_PARTS = ["ירך קדמית","ירך אחורית","שוק","קרסול","גב","כאב חד","כאב כללי"];
const STRENGTH_GROUPS = ["ליבה","רגליים","פלג גוף עליון","פליאומטרי","ניידות"];
const STRENGTH_LIB = {
  "ליבה":["פלאנק","Dead Bug","Bird Dog","Russian Twist","Hollow Hold"],
  "רגליים":["סקוואט","Lunge","Bulgarian Split Squat","Deadlift","Calf Raise","Step Up"],
  "פלג גוף עליון":["Push Up","Pull Up","Row","Shoulder Press","Bench Press"],
  "פליאומטרי":["Box Jump","Broad Jump","Bounding","Pogo","Single Leg Hop"],
  "ניידות":["Foam Roll","World’s Greatest Stretch","Hip Opener","T-Spine Rotation"]
};

/* ──────────────── state ──────────────── */
const state = {
  page:"weekly",
  weekStart:startOfWeek(new Date()),     // Sunday
  weekData:{},                            // {dateISO: dayObj}
  allWeeks:[],                            // for season view
  profile:{},
  races:[],
  goals:[],
  strength:[],
  dynamics:[],
  charts:{}
};

/* ──────────────── utilities ──────────────── */
function startOfWeek(d){const x=new Date(d);x.setHours(0,0,0,0);x.setDate(x.getDate()-x.getDay());return x}
function fmtISO(d){return d.toISOString().slice(0,10)}
function fmtHe(d){return d.toLocaleDateString("he-IL",{day:"2-digit",month:"2-digit"})}
function addDays(d,n){const x=new Date(d);x.setDate(x.getDate()+n);return x}
function isoWeekStr(d){
  const t=new Date(Date.UTC(d.getFullYear(),d.getMonth(),d.getDate()));
  const day=t.getUTCDay()||7; t.setUTCDate(t.getUTCDate()+4-day);
  const ys=new Date(Date.UTC(t.getUTCFullYear(),0,1));
  const wn=Math.ceil(((t-ys)/86400000+1)/7);
  return t.getUTCFullYear()+"-W"+String(wn).padStart(2,"0");
}
function $(s,r=document){return r.querySelector(s)}
function $$(s,r=document){return [...r.querySelectorAll(s)]}
function el(tag,attrs={},...kids){
  const e=document.createElement(tag);
  for(const k in attrs){
    if(k==="class")e.className=attrs[k];
    else if(k==="html")e.innerHTML=attrs[k];
    else if(k.startsWith("on"))e.addEventListener(k.slice(2),attrs[k]);
    else if(attrs[k]!==undefined && attrs[k]!==null)e.setAttribute(k,attrs[k]);
  }
  for(const k of kids){if(k==null)continue;e.append(k.nodeType?k:document.createTextNode(k))}
  return e;
}
function toast(msg,type=""){const t=$("#toast");t.textContent=msg;t.className="show "+type;setTimeout(()=>t.className="",2200)}
function showLoader(b){$("#loader").classList.toggle("show",b)}
function openModal(html){$("#modalBody").innerHTML=html;$("#modalBg").classList.add("show")}
function closeModal(){$("#modalBg").classList.remove("show")}
$("#modalBg").addEventListener("click",e=>{if(e.target.id==="modalBg")closeModal()});

/* ──────────────── API ──────────────── */
async function api(action,payload){
  if(!APPS_SCRIPT_URL || APPS_SCRIPT_URL.includes("PASTE_YOUR")){
    console.warn("APPS_SCRIPT_URL not configured — running in demo mode");
    return demoApi(action,payload);
  }
  showLoader(true);
  try{
    let url=APPS_SCRIPT_URL, opts;
    if(payload){
      opts={method:"POST",body:JSON.stringify({action,data:payload}),
            headers:{"Content-Type":"text/plain;charset=utf-8"}}; // text/plain avoids preflight
    } else {
      const qs=new URLSearchParams({action,...(arguments[2]||{})});
      url+= (url.includes("?")?"&":"?")+qs.toString();
    }
    const r=await fetch(url,opts);
    const j=await r.json();
    if(!j.ok) throw new Error(j.error||"שגיאה לא ידועה");
    return j.data;
  }catch(e){
    console.error(e); toast("שגיאה: "+e.message,"err"); throw e;
  }finally{ showLoader(false) }
}
function apiGet(action,params={}){return api(action,null,params)}

/* demo data fallback */
function demoApi(action){
  const empty={Weekly:[],Profile:{},Races:[],Strength:[],Dynamics:[],Goals:[]};
  if(action==="getAll") return Promise.resolve(empty);
  if(action==="getProfile") return Promise.resolve({});
  if(action==="getWeek") return Promise.resolve({});
  return Promise.resolve({ok:true});
}

/* ──────────────── ROUTING ──────────────── */
$$("#nav button").forEach(b=>b.addEventListener("click",()=>switchPage(b.dataset.page)));
function switchPage(p){
  state.page=p;
  $$("#nav button").forEach(b=>b.classList.toggle("active",b.dataset.page===p));
  $$(".page").forEach(el=>el.hidden=true);
  $("#page-"+p).hidden=false;
  renderPage(p);
}
async function renderPage(p){
  if(p==="weekly")   await renderWeekly();
  if(p==="season")   await renderSeason();
  if(p==="stats")    await renderStats();
  if(p==="goals")    await renderGoals();
  if(p==="profile")  await renderProfile();
  if(p==="strength") await renderStrength();
  if(p==="dynamics") await renderDynamics();
}

/* ══════════════════════════════════════════════════════════��═════
   PAGE 1 — WEEKLY
   ════════════════════════════════════════════════════════════════ */
async function renderWeekly(){
  const root=$("#page-weekly");
  const wkStr=isoWeekStr(state.weekStart);
  root.innerHTML="";
  // top bar
  const top=el("div",{class:"topbar"},
    el("h1",{html:`📅 תוכנית שבועית <span class="accent">— ${ATHLETE_NAME}</span>`}),
    el("div",{class:"row"},
      el("button",{class:"btn ghost sm",onclick:()=>{state.weekStart=addDays(state.weekStart,-7);renderWeekly()}},"◀ שבוע קודם"),
      el("div",{class:"badge"},`שבוע ${wkStr}`),
      el("button",{class:"btn ghost sm",onclick:()=>{state.weekStart=addDays(state.weekStart,7);renderWeekly()}},"שבוע הבא ▶"),
      el("button",{class:"btn ghost sm",onclick:()=>{state.weekStart=startOfWeek(new Date());renderWeekly()}},"היום"),
      el("button",{class:"btn",onclick:saveWholeWeek},"💾 שמור הכל")
    )
  );
  root.append(top);

  // load data
  let data={};
  try{ data = await apiGet("getWeek",{week:wkStr}) || {}; }catch(e){}
  state.weekData = data || {};

  // grid
  const wrap=el("div",{class:"weekly"});
  for(let i=0;i<7;i++){
    const date=addDays(state.weekStart,i);
    const iso=fmtISO(date);
    const day = state.weekData[iso] || {};
    wrap.append(buildDayColumn(i,date,iso,day));
  }
  root.append(wrap);

  // summary
  root.append(buildWeeklySummary());
}

function buildDayColumn(idx,date,iso,day){
  const col=el("div",{class:"day","data-date":iso});
  col.append(el("h4",{},DAY_NAMES_HE[idx], el("span",{class:"date"},fmtHe(date))));

  // COACH SECTION
  const coach=el("div",{class:"sec-coach"});
  coach.append(el("div",{class:"sec-title"},"מאמן"));

  // ROW 1 — type
  const typeSel=el("select",{},
    el("option",{value:""},"— סוג אימון —"),
    ...WORKOUT_TYPES.map(t=>el("option",{value:t,...(day.type===t?{selected:true}:{})},t))
  );
  typeSel.addEventListener("change",()=>{day.type=typeSel.value;day.builder={};rebuildBuilder()});
  coach.append(label1("סוג אימון"),typeSel);

  // ROW 2 — builder
  const builderWrap=el("div",{class:"builder",style:"margin-top:8px"});
  function rebuildBuilder(){ builderWrap.innerHTML=""; builderWrap.append(buildWorkoutBuilder(day)); rebuildSplits(); }
  builderWrap.append(buildWorkoutBuilder(day));
  coach.append(builderWrap);

  // ROW 3 — max km
  const maxKm=el("input",{type:"number",step:"0.1",min:"0",placeholder:"0",value:day.maxKm||""});
  maxKm.addEventListener("input",()=>day.maxKm=parseFloat(maxKm.value)||0);
  coach.append(label1("מרחק מקסימלי (ק\"מ)"),maxKm);

  // ROW 4 — target intensity
  coach.append(label1("עצימות יעד"),buildIntensity(day,"targetIntensity"));

  col.append(coach);
  col.append(el("div",{class:"divider"}));

  // ATHLETE SECTION
  const ath=el("div",{class:"sec-athlete"});
  ath.append(el("div",{class:"sec-title"},"ספורטאי"));

  // ROW 5 actual km
  const actKm=el("input",{type:"number",step:"0.1",min:"0",placeholder:"0",value:day.actualKm||""});
  actKm.addEventListener("input",()=>{day.actualKm=parseFloat(actKm.value)||0;updateKmBadge()});
  ath.append(label1("מרחק בפועל (ק\"מ)"),actKm);

  // ROW 6 splits
  const splitsWrap=el("div",{class:"splits-wrap"});
  function rebuildSplits(){ splitsWrap.innerHTML=""; splitsWrap.append(buildSplits(day)); }
  rebuildSplits();
  ath.append(label1("ביצוע בפועל"),splitsWrap);

  // ROW 7 feel
  const feel=el("textarea",{placeholder:"איך הרגשת היום?"},day.feel||"");
  feel.addEventListener("input",()=>day.feel=feel.value);
  ath.append(label1("איך הרגשת"),feel);

  // ROW 8 actual intensity

    const lbl=el("label",{for:id,class:day.tight.includes(p)?"on":""},cb,p);

      else{day.tight=day.tight.filter(x=>x!==p);lbl.classList.remove("on")}
    });

  });

  const km=el("div",{class:"km-badge"},(day.actualKm||0).toFixed(1)+" ק\"מ היום");

  // save button
  col.append(el("button",{class:"btn sm",style:"margin-top:6px",onclick:()=>saveDay(iso,day)},"💾 שמור יום"));

function buildWorkoutBuilder(day){
  const t=day.type, b=day.builder=day.builder||{};
  const w=el("div");
  if(t==="פרטלק"){
    b.intervals=b.intervals||[];
    w.append(field("חימום (דקות)","warmup",b));
    const list=el("div");
    function paint(){
      list.innerHTML="";
      b.intervals.forEach((iv,idx)=>{
        const r=el("div",{class:"interval-row"},
          inp("ON",iv,"on"), inp("OFF",iv,"off"), inp("חזרות",iv,"reps"),
          el("button",{class:"btn sm danger",onclick:()=>{b.intervals.splice(idx,1);paint()}},"✕")
        );
        list.append(r);
      });
    }
    paint();
    w.append(el("div",{style:"margin-top:6px"},list));
    w.append(el("button",{class:"btn ghost sm",style:"margin-top:4px",onclick:()=>{b.intervals.push({on:"",off:"",reps:""});paint()}},"+ הוסף קטע"));
    w.append(field("שחרור (דקות)","cooldown",b));
  } else if(t==="אינטרוולים"){
    w.append(selectField("סוג",["לפי זמן","לפי מרחק"],"mode",b));
    w.append(field("חזרות","reps",b,"number"));
    w.append(field("מרחק/זמן","unit",b));
    w.append(field("מנוחה בין חזרות (שנ׳)","restRep",b,"number"));
    w.append(field("סטים","sets",b,"number"));
    w.append(field("מנוחה בין סטים (דק׳)","restSet",b,"number"));
    w.append(field("חימום (דק׳)","warmup",b,"number"));
    w.append(field("שחרור (דק׳)","cooldown",b,"number"));
    const sum=el("div",{class:"badge",style:"margin-top:6px"},summarize());
    function summarize(){return `${b.reps||"?"}×${b.unit||"?"} | מנוחה ${b.restRep||"?"}שנ׳ | ${b.sets||1} סטים`}
    w.querySelectorAll("input,select").forEach(i=>i.addEventListener("input",()=>sum.textContent=summarize()));
    w.append(sum);
  } else if(t==="ריצה ארוכה"){
    w.append(field("סה\"כ זמן (דק׳)","totalMin",b,"number"));
    w.append(field("דופק יעד","targetHR",b,"number"));
    b.segments=b.segments||[];
    const list=el("div");
    function paint(){
      list.innerHTML="";
      b.segments.forEach((s,i)=>{
        list.append(el("div",{class:"interval-row"},
          inp("ק\"מ",s,"km"), inp("טמפו",s,"pace"), el("span"),
          el("button",{class:"btn sm danger",onclick:()=>{b.segments.splice(i,1);paint()}},"✕")
        ));
      });
    }
    paint();
    w.append(el("div",{style:"margin-top:6px"},list));
    w.append(el("button",{class:"btn ghost sm",onclick:()=>{b.segments.push({km:"",pace:""});paint()}},"+ הוסף קטע"));
  } else if(t==="טמפו"){
    w.append(field("מרחק (ק\"מ)","km",b,"number"));
    w.append(field("טמפו (דק/ק\"מ)","pace",b));
    w.append(field("חימום (דק׳)","warmup",b,"number"));
    w.append(field("שחרור (דק׳)","cooldown",b,"number"));
  } else if(t){
    w.append(el("div",{class:"muted",style:"font-size:12px"},"אין בנאי מפורט לסוג זה."));
  }
  return w;
}
function field(lbl,k,obj,type="text"){
  const i=el("input",{type,value:obj[k]??"",placeholder:lbl});
  i.addEventListener("input",()=>obj[k]=i.value);
  return el("div",{},el("label",{},lbl),i);
}
function inp(ph,obj,k){
  const i=el("input",{placeholder:ph,value:obj[k]??""});
  i.addEventListener("input",()=>obj[k]=i.value);
  return i;
}
function selectField(lbl,opts,k,obj){
  const s=el("select",{},...opts.map(o=>el("option",{value:o,...(obj[k]===o?{selected:true}:{})},o)));
  s.addEventListener("change",()=>obj[k]=s.value);
  return el("div",{},el("label",{},lbl),s);
}

function buildSplits(day){
  const w=el("div");
  const b=day.builder||{};
  day.splits=day.splits||[];
  if(day.type==="אינטרוולים" && b.reps){
    const total=(+b.reps)*(+b.sets||1);
    const grid=el("div",{class:"split-grid"});
    for(let i=0;i<total;i++){
      const sp=el("div",{class:"sp"});
      const inp=el("input",{type:"text",placeholder:"חזרה "+(i+1),value:day.splits[i]||""});
      const dev=el("span",{class:"dev"});
      function calc(){
        const v=parseFloat(inp.value), tgt=parseFloat(b.unit);
        if(!isNaN(v)&&!isNaN(tgt)){
          const d=v-tgt;
          dev.textContent=(d>=0?"+":"")+d.toFixed(1);
          dev.className="dev "+(d<=0?"ok":"bad");
        } else dev.textContent="";
      }
      inp.addEventListener("input",()=>{day.splits[i]=inp.value;calc()});
      calc();
      sp.append(inp,dev); grid.append(sp);
    }
    w.append(grid);
  } else if(day.type==="ריצה ארוכה" || day.type==="טמפו" || day.type==="ריצה קלה" || day.type==="ריצה הררית" || day.type==="פרטלק"){
    const i=el("input",{placeholder:"טמפו ממוצ�� (דק/ק\"מ)",value:day.avgPace||""});
    i.addEventListener("input",()=>day.avgPace=i.value);
    w.append(i);
  } else {
    w.append(el("div",{class:"muted",style:"font-size:12px"},"—"));
  }
  return w;
}

function buildWeeklySummary(){
  const wrap=el("div",{class:"weekly-summary"});
  let totalKm=0,sessions=0,sumInt=0,intCount=0,maxDay=0;
  Object.values(state.weekData).forEach(d=>{
    if(d.actualKm){totalKm+=d.actualKm;sessions++;maxDay=Math.max(maxDay,d.actualKm)}
    if(d.actualIntensity){sumInt+=d.actualIntensity;intCount++}
  });
  const avgInt=intCount?(sumInt/intCount).toFixed(1):"—";
  wrap.id="weekSum";
  wrap.append(
    stat(totalKm.toFixed(1),"סה\"כ ק\"מ"),
    stat(sessions,"אימונים"),
    stat(avgInt,"עצימות ממוצעת"),
    stat(maxDay.toFixed(1),"היום הגדול ביותר")
  );
  return wrap;
}
function stat(v,l){return el("div",{class:"stat"},el("div",{class:"v"},String(v)),el("div",{class:"l"},l))}
function recalcSummary(){
  const ws=$("#weekSum");
  if(ws){const n=buildWeeklySummary();ws.replaceWith(n)}
}

async function renderSeason(){
  const root=$("#page-season");
  root.innerHTML="";
  root.append(el("div",{class:"topbar"},el("h1",{html:`🗓️ <span class="accent">לוח שנה שלם</span>`})));

  let all={};
  try{ all = await apiGet("getAll") || {Weekly:[]}; }catch(e){ all={Weekly:[]} }
  // group by week
  const byWeek={};
  (all.Weekly||[]).forEach(r=>{
    const wk=r.week||isoWeekStr(new Date(r.date));
    byWeek[wk]=byWeek[wk]||{};
    byWeek[wk][r.date]=r;
  });
  // last 26 weeks
  const weeks=Object.keys(byWeek).sort().slice(-26).reverse();
  if(weeks.length===0){
    root.append(el("div",{class:"card muted"},"אין נתונים בעונה עדיין. מלא שבוע ב-📅 שבועי ושמור."));
    return;
  }
  const card=el("div",{class:"card"});
  const tbl=el("table");
  const head=el("thead",{},el("tr",{},
    el("th",{},"שבוע"), el("th",{},"תאריך התחלה"),
    ...DAY_NAMES_HE.map(d=>el("th",{},d)),
    el("th",{},"סה\"כ ק\"מ"), el("th",{},"עצימות ממוצעת")
  ));
  const body=el("tbody");

  // 4-wk rolling
  const weekTotals={};
  weeks.forEach(w=>{
    let tot=0; Object.values(byWeek[w]).forEach(d=>tot+=parseFloat(d.actualKm||0));
    weekTotals[w]=tot;
  });

  weeks.forEach((w,wi)=>{
    const days=byWeek[w];
    const dayKeys=Object.keys(days).sort();
    const startD=dayKeys[0]||"";
    let total=0,sumI=0,nI=0;
    const cells=[0,1,2,3,4,5,6].map(di=>{
      const d=Object.values(days).find(x=>new Date(x.date).getDay()===di);
      if(!d) return el("td",{class:"cell-rest"},"—");
      const km=parseFloat(d.actualKm||0);
      total+=km;
      if(d.actualIntensity){sumI+=+d.actualIntensity;nI++}
      const planned=parseFloat(d.maxKm||0);
      let cls="cell-done";
      if(d.type==="מנוחה")cls="cell-rest";
      else if(planned && km<planned*0.6)cls="cell-miss";
      else if(planned && km<planned*0.95)cls="cell-partial";
      const ico=WORKOUT_ICONS[d.type]||"•";
      const td=el("td",{class:cls,title:d.type||""},`${ico} ${km?km.toFixed(1):0}`);
      td.addEventListener("click",()=>openDayDetail(d));
      return td;
    });
    body.append(el("tr",{},
      el("td",{class:"badge"},w),
      el("td",{},startD),
      ...cells,
      el("td",{html:`<b style="color:var(--gold)">${total.toFixed(1)}</b>`}),
      el("td",{},nI?(sumI/nI).toFixed(1):"—")
    ));
  });
  tbl.append(head,body);
  card.append(tbl);
  root.append(card);

  // rolling 4wk
  const recent=weeks.slice(0,4);
  const avg4=recent.reduce((s,w)=>s+weekTotals[w],0)/Math.max(1,recent.length);
  const avgPrev=weeks.slice(4,8).reduce((s,w)=>s+weekTotals[w],0)/4 || 0;
  const trend = avg4>avgPrev?"📈 עולה":avg4<avgPrev?"📉 יורד":"➡️ יציב";
  root.append(el("div",{class:"card"},el("h3",{},"ממוצע נע 4 שבועות"),
    el("div",{},`ממוצע: ${avg4.toFixed(1)} ק"מ / שבוע — מגמה: ${trend}`)));
}
function openDayDetail(d){
  openModal(`<h3 style="color:var(--gold)">${d.date} • ${d.type||""}</h3>
    <div class="muted">מרחק יעד: ${d.maxKm||"—"} | בפועל: ${d.actualKm||"—"}</div>
    <p><b>תחושה:</b> ${d.feel||"—"}</p>
    <p><b>עצימות יעד/בפועל:</b> ${d.targetIntensity||0} / ${d.actualIntensity||0}</p>
    <p><b>תיעודים:</b> ${(d.tight||[]).join(", ")||"—"}</p>

}

async function renderStats(){
  const root=$("#page-stats");
  root.innerHTML="";
  root.append(el("div",{class:"topbar"},el("h1",{html:`📈 <span class="accent">סטטיסטיקות</span>`})));

  let all={};
  try{ all=await apiGet("getAll") || {Weekly:[]}; }catch(e){ all={Weekly:[]} }
  const rows=all.Weekly||[];

  // aggregate per week
  const byWeek={};
  rows.forEach(r=>{
    const wk=r.week||isoWeekStr(new Date(r.date));
    if(!byWeek[wk])byWeek[wk]={planned:0,actual:0,intSum:0,intN:0,types:{}};
    byWeek[wk].planned+=+r.maxKm||0;
    byWeek[wk].actual+=+r.actualKm||0;
    if(r.actualIntensity){byWeek[wk].intSum+=+r.actualIntensity;byWeek[wk].intN++}
    if(r.type){byWeek[wk].types[r.type]=(byWeek[wk].types[r.type]||0)+1}
  });
  const weeks=Object.keys(byWeek).sort().slice(-12);

  // stat cards
  let seasonKm=0, biggest=0, biggestW="", streak=0;
  rows.forEach(r=>{seasonKm+=+r.actualKm||0});
  weeks.forEach(w=>{if(byWeek[w].actual>biggest){biggest=byWeek[w].actual;biggestW=w}});
  // streak — consecutive days with actualKm>0
  const dates=rows.filter(r=>+r.actualKm>0).map(r=>r.date).sort();
  let cur=0,best=0;let prev=null;
  dates.forEach(d=>{
    if(prev){const diff=(new Date(d)-new Date(prev))/86400000;if(diff===1)cur++;else cur=1}else cur=1;
    best=Math.max(best,cur);prev=d;
  });
  streak=best;
  const avgWk= weeks.length? (weeks.reduce((s,w)=>s+byWeek[w].actual,0)/weeks.length).toFixed(1) : "0";
  root.append(el("div",{class:"weekly-summary"},
    stat(seasonKm.toFixed(0),"סה\"כ ק\"מ עונה"),
    stat(biggest.toFixed(1),"שבוע הכי גדול"),
    stat(streak,"רצף ימי אימון"),
    stat(avgWk,"ממוצע שבועי")
  ));

  // grid of charts
  const g=el("div",{class:"charts-grid"});
  g.append(chartCard("ק\"מ לשבוע (12 ש׳)","c1"));
  g.append(chartCard("עצימות ממוצעת לשבוע","c2"));
  g.append(chartCard("התפלגות סוגי אימון","c3"));
  g.append(chartCard("בפועל מול מתוכנן","c4"));
  g.append(chartCard("מפת חום של נוקשות","c5"));
  root.append(g);

  // chart 1
  Object.values(state.charts).forEach(c=>c.destroy());
  state.charts={};
  state.charts.c1=new Chart($("#c1"),{type:"line",data:{labels:weeks,datasets:[
    {label:"מתוכנן",data:weeks.map(w=>byWeek[w].planned),borderColor:"#C9A84C",borderDash:[6,4],tension:.3},
    {label:"בפועל",data:weeks.map(w=>byWeek[w].actual),borderColor:"#fff",tension:.3}
  ]},options:chartOpts()});

  state.charts.c2=new Chart($("#c2"),{type:"bar",data:{labels:weeks,datasets:[{
    label:"RPE", data:weeks.map(w=>byWeek[w].intN?byWeek[w].intSum/byWeek[w].intN:0),
    backgroundColor:weeks.map(w=>{const v=byWeek[w].intN?byWeek[w].intSum/byWeek[w].intN:0;return v<4?"#22C55E":v<7?"#F59E0B":"#EF4444"})
  }]},options:chartOpts()});

  // pie types
  const typeAgg={};
  rows.forEach(r=>{if(r.type)typeAgg[r.type]=(typeAgg[r.type]||0)+1});
  state.charts.c3=new Chart($("#c3"),{type:"doughnut",data:{labels:Object.keys(typeAgg),datasets:[{
    data:Object.values(typeAgg),
    backgroundColor:["#C9A84C","#E8C97A","#22C55E","#3B82F6","#EF4444","#A855F7","#F59E0B","#6B6B6B","#84cc16","#06b6d4"]
  }]},options:{...chartOpts(),plugins:{legend:{labels:{color:"#fff"}}}}});

  state.charts.c4=new Chart($("#c4"),{type:"bar",data:{labels:weeks,datasets:[{
    label:"% השלמה",
    data:weeks.map(w=>byWeek[w].planned?Math.round(byWeek[w].actual/byWeek[w].planned*100):0),
    backgroundColor:"#C9A84C"
  }]},options:chartOpts()});

  // tightness heatmap as bar
  const tight={};
  rows.forEach(r=>{(r.tight||[]).forEach(p=>tight[p]=(tight[p]||0)+1)});
  state.charts.c5=new Chart($("#c5"),{type:"bar",data:{labels:Object.keys(tight),datasets:[{
    data:Object.values(tight),backgroundColor:"#EF4444"
  }]},options:{...chartOpts(),indexAxis:"y"}});
}

  responsive:true,maintainAspectRatio:false,
  plugins:{legend:{labels:{color:"#fff"}}},
  scales:{x:{ticks:{color:"#bbb"},grid:{color:"#222"}},y:{ticks:{color:"#bbb"},grid:{color:"#222"}}}
}}

      el("button",{class:"btn sm danger",onclick:()=>{state.goals.splice(i,1);renderGoals()}},"✕")
    )
  );
}
function raceRow(r,i){
  function tdInp(k,type="text"){const i=el("input",{type,value:r[k]||""});i.addEventListener("input",()=>r[k]=i.value);return el("td",{},i)}

    tdInp("date","date"),tdInp("name"),tdInp("distance"),tdInp("time"),tdInp("pace"),tdInp("place"),tdInp("notes"),
    el("td",{},

      " ",
      el("button",{class:"btn sm danger",onclick:()=>{state.races.splice(i,1);renderGoals()}},"✕")
    )
  );
}

/* ════════════════════════════════════════════════════════════════
   PAGE 5 — PROFILE
   ════════════════════════════════════════════════════════════════ */
async function renderProfile(){
  const root=$("#page-profile");
  root.innerHTML="";
  root.append(el("div",{class:"topbar"},
    el("h1",{html:`👤 <span class="accent">פרופיל ספורטאי</span>`}),
    el("button",{class:"btn",onclick:saveProfile},"💾 שמור פרופיל")
  ));

  let p={};
  try{ p=(await apiGet("getProfile"))||{}; }catch(e){}
  state.profile=p;

  const card1=el("div",{class:"card"});
  card1.append(el("h3",{},"נתונים אישיים"));
  const grid1=el("div",{class:"grid",style:"grid-template-columns:repeat(auto-fit,minmax(180px,1fr))"});
  ["name","שם","age","גיל","height","גובה (ס\"מ)","weight","משקל (ק\"ג)","vo2max","VO2max"].reduce((a,_,i,arr)=>{
    if(i%2===0) a.push([arr[i],arr[i+1]]); return a;
  },[]).forEach(([k,l])=>grid1.append(field(l,k,p)));
  card1.append(grid1);
  root.append(card1);

  const card2=el("div",{class:"card"});
  card2.append(el("h3",{},"סף לקטטי ודופק"));
  const grid2=el("div",{class:"grid",style:"grid-template-columns:repeat(auto-fit,minmax(180px,1fr))"});
  [["lt_pace","סף לקטטי - טמפו"],["lt_hr","סף לקטטי - דופק"],["restHR","דופק מנוחה"],["maxHR","דופק מקסימלי"]].forEach(([k,l])=>grid2.append(field(l,k,p)));
  card2.append(grid2);

  // HR zones
  const zones=el("div",{style:"margin-top:10px"});
  const max=+p.maxHR||0;
  const z=[
    ["Z1 התאוששות",.5,.6,"#22C55E"],
    ["Z2 אירובי",.6,.7,"#84cc16"],
    ["Z3 טמפו",.7,.8,"#F59E0B"],
    ["Z4 סף",.8,.9,"#EF4444"],
    ["Z5 מקסימלי",.9,1,"#a855f7"]
  ];
  zones.append(el("div",{class:"muted",style:"margin-bottom:6px"},"אזורי דופק (לפי דופק מקס):"));
  z.forEach(([n,a,b,c])=>{
    zones.append(el("div",{style:`display:flex;justify-content:space-between;padding:6px 10px;background:#161616;border-inline-start:4px solid ${c};margin-bottom:4px;border-radius:6px`},
      el("span",{},n), el("span",{style:"color:var(--gold-lt);font-weight:700"},max?`${Math.round(max*a)}–${Math.round(max*b)}`:"—")
    ));
  });
  card2.append(zones);
  root.append(card2);

  // PRs
  const card3=el("div",{class:"card"});
  card3.append(el("h3",{},"שיאים אישיים"));
  p.prs = p.prs || [{dist:"1500",time:"",date:"",cond:"",notes:""},{dist:"3000",time:"",date:"",cond:"",notes:""},{dist:"5000",time:"",date:"",cond:"",notes:""},{dist:"10000",time:"",date:"",cond:"",notes:""},{dist:"10K",time:"",date:"",cond:"",notes:""},{dist:"HM",time:"",date:"",cond:"",notes:""},{dist:"Marathon",time:"",date:"",cond:"",notes:""}];
  const tbl=el("table");tbl.append(el("thead",{},el("tr",{},...["מרחק","זמן","תאריך","תנאים","הערות"].map(h=>el("th",{},h)))));
  const tb=el("tbody");
  p.prs.forEach(pr=>{
    function tdInp(k,t="text"){const i=el("input",{type:t,value:pr[k]||""});i.addEventListener("input",()=>pr[k]=i.value);return el("td",{},i)}
    tb.append(el("tr",{},el("td",{html:`<b>${pr.dist}</b>`}),tdInp("time"),tdInp("date","date"),tdInp("cond"),tdInp("notes")));
  });
  tbl.append(tb); card3.append(tbl);
  root.append(card3);

  // Running economy
  const card4=el("div",{class:"card"});
  card4.append(el("h3",{},"כלכלת ריצה"));
  const g4=el("div",{class:"grid",style:"grid-template-columns:repeat(auto-fit,minmax(180px,1fr))"});
  g4.append(field("צעדים לדקה (Cadence)","cadence",p,"number"));
  g4.append(field("אורך צעד (מ)","stride",p,"number"));
  card4.append(g4);
  const eff = p.cadence>180?"גבוהה":p.cadence>165?"בינונית":p.cadence?"נמוכה":"—";
  card4.append(el("div",{class:"badge",style:"margin-top:8px"},"יעילות ריצה: "+eff));
  root.append(card4);

  // Coach notes
  const card5=el("div",{class:"card"});
  card5.append(el("h3",{},"הערות מאמן"));
  const ta=el("textarea",{style:"min-height:140px",placeholder:"הערות, ניתוח, כיוונים..."},p.coachNotes||"");
  ta.addEventListener("input",()=>p.coachNotes=ta.value);
  card5.append(ta);
  root.append(card5);
}
async function saveProfile(){await api("saveProfile",state.profile);toast("פרופיל נשמר ✓","ok")}

/* ════════════════════════════════════════════════════════════════
   PAGE 6 — STRENGTH
   ════════════════════════════════════════════════════════════════ */
async function renderStrength(){
  const root=$("#page-strength");
  root.innerHTML="";
  root.append(el("div",{class:"topbar"},
    el("h1",{html:`💪 <span class="accent">אימוני כוח</span>`}),
    el("button",{class:"btn",onclick:()=>{state.strength.push({date:fmtISO(new Date()),group:"ליבה",exercise:"",sets:3,reps:10,weight:0,rest:60,rpe:7,status:"מתוכנן"});renderStrength()}},"+ הוסף תרגיל")
  ));

  let data={};
  try{ data=await apiGet("getAll"); }catch(e){data={}}
  state.strength = data.Strength || state.strength;

  // group filter
  const filter={current:"הכל"};
  const fbar=el("div",{class:"row",style:"margin-bottom:10px"});
  ["הכל",...STRENGTH_GROUPS].forEach(g=>{
    const b=el("button",{class:"btn ghost sm",onclick:()=>{filter.current=g;paint()}},g);
    fbar.append(b);
  });
  root.append(fbar);

  const card=el("div",{class:"card"});
  const tbl=el("table");
  tbl.append(el("thead",{},el("tr",{},
    ...["תאריך","קבוצה","תרגיל","סטים","חזרות","משקל","מנוחה","RPE","נפח","סטטוס",""].map(h=>el("th",{},h))
  )));
  const body=el("tbody");
  tbl.append(body); card.append(tbl); root.append(card);

  // weekly volume chart
  const cc=el("div",{class:"chart-card",style:"margin-top:14px"},el("h3",{},"נפח שבועי כוח"),el("canvas",{id:"strChart"}));
  root.append(cc);

  function paint(){
    body.innerHTML="";
    const list=state.strength.filter(s=>filter.current==="הכל"||s.group===filter.current);
    list.forEach((s,i)=>{
      function tdInp(k,t="text",w){const inp=el("input",{type:t,value:s[k]??"",style:w?"width:"+w:""});inp.addEventListener("input",()=>{s[k]=t==="number"?+inp.value:inp.value;updVol()});return el("td",{},inp)}
      function tdSel(k,opts){const sel=el("select",{},...opts.map(o=>el("option",{value:o,...(s[k]===o?{selected:true}:{})},o)));sel.addEventListener("change",()=>{s[k]=sel.value;if(k==="group")paint()});return el("td",{},sel)}
      const exOpts=STRENGTH_LIB[s.group]||[];
      const exSel=el("select",{},el("option",{value:""},"— תרגיל —"),...exOpts.map(o=>el("option",{value:o,...(s.exercise===o?{selected:true}:{})},o)));
      exSel.addEventListener("change",()=>s.exercise=exSel.value);
      const volTd=el("td",{html:`<b style="color:var(--gold)">${(+s.sets||0)*(+s.reps||0)*(+s.weight||0)}</b>`});
      function updVol(){volTd.innerHTML=`<b style="color:var(--gold)">${(+s.sets||0)*(+s.reps||0)*(+s.weight||0)}</b>`;updChart()}
      body.append(el("tr",{},
        tdInp("date","date"), tdSel("group",STRENGTH_GROUPS),
        el("td",{},exSel),
        tdInp("sets","number","60px"),tdInp("reps","number","60px"),tdInp("weight","number","70px"),
        tdInp("rest","number","60px"),tdInp("rpe","number","60px"),
        volTd,
        tdSel("status",["מתוכנן","בוצע","דולג"]),
        el("td",{},
          el("button",{class:"btn sm",onclick:async()=>{await api("saveWorkout",s);toast("נשמר","ok")}},"💾"),
          " ",
          el("button",{class:"btn sm danger",onclick:()=>{const idx=state.strength.indexOf(s);state.strength.splice(idx,1);paint()}},"✕")
        )
      ));
    });
    updChart();
  }
  function updChart(){
    const byWeek={};
    state.strength.forEach(s=>{
      if(!s.date)return;
      const w=isoWeekStr(new Date(s.date));
      byWeek[w]=(byWeek[w]||0)+(+s.sets||0)*(+s.reps||0)*(+s.weight||0);
    });
    const labels=Object.keys(byWeek).sort();
    if(state.charts.str)state.charts.str.destroy();
    state.charts.str=new Chart($("#strChart"),{type:"bar",data:{labels,datasets:[{label:"נפח (kg)",data:labels.map(l=>byWeek[l]),backgroundColor:"#C9A84C"}]},options:chartOpts()});
  }
  paint();
}

   PAGE 7 — DYNAMICS
   ════════════════════════════════════════════════════════════════ */
async function renderDynamics(){
  const root=$("#page-dynamics");
  root.innerHTML="";
  root.append(el("div",{class:"topbar"},
    el("h1",{html:`⚡ <span class="accent">נתוני ריצה</span>`}),
    el("div",{class:"row"},
      el("button",{class:"btn ghost",onclick:exportCSV},"⬇ ייצוא CSV"),
      el("button",{class:"btn",onclick:()=>{state.dynamics.push({date:fmtISO(new Date()),avgPace:"",bestPace:"",avgHR:"",peakHR:"",cadence:"",up:"",down:"",time:"",z1:0,z2:0,z3:0,z4:0,z5:0});renderDynamics()}},"+ סשן חדש")
    )
  ));
  let data={};
  try{ data=await apiGet("getAll"); }catch(e){data={}}
  state.dynamics = data.Dynamics || state.dynamics;

  state.dynamics.forEach(s=>{
    const card=el("div",{class:"card"});
    const grid=el("div",{class:"grid",style:"grid-template-columns:repeat(auto-fit,minmax(150px,1fr))"});
    function f(l,k,t="text"){return field(l,k,s,t)}
    grid.append(f("תאריך","date","date"),f("קצב ממוצע","avgPace"),f("קצב מהיר ביותר","bestPace"),
      f("דופק ממוצע","avgHR","number"),f("דופק פסגה","peakHR","number"),
      f("קדנס ממוצע","cadence","number"),f("עלייה כוללת (מ)","up","number"),
      f("ירידה כוללת (מ)","down","number"),f("זמן בריצה","time"));
    card.append(grid);
    // zones
    card.append(el("div",{class:"sec-title",style:"margin-top:10px"},"זמן באזורי דופק"));
    const zwrap=el("div");
    [["Z1","z1","#22C55E"],["Z2","z2","#84cc16"],["Z3","z3","#F59E0B"],["Z4","z4","#EF4444"],["Z5","z5","#a855f7"]].forEach(([n,k,c])=>{
      const v=+s[k]||0;
      const bar=el("div",{style:"display:flex;align-items:center;gap:8px;margin-bottom:4px"},
        el("span",{style:"width:30px"},n),
        el("div",{style:`flex:1;background:#222;border-radius:6px;overflow:hidden;height:14px`},
          el("div",{style:`background:${c};width:${Math.min(100,v)}%;height:100%`})),
        el("input",{type:"number",style:"width:70px",value:v,oninput:e=>{s[k]=+e.target.value;renderDynamics()}}),
        el("span",{class:"muted"},"%")
      );
      zwrap.append(bar);
    });
    card.append(zwrap);
    card.append(el("div",{style:"margin-top:8px",class:"row"},
      el("button",{class:"btn sm",onclick:async()=>{await api("saveDynamics",s);toast("נשמר","ok")}},"💾 שמור סשן"),
      el("button",{class:"btn sm danger",onclick:()=>{const i=state.dynamics.indexOf(s);state.dynamics.splice(i,1);renderDynamics()}},"מחק")
    ));
    root.append(card);
  });

  if(state.dynamics.length===0)
    root.append(el("div",{class:"card muted"},"אין סשנים. לחץ ״+ סשן חדש״."));
}
function exportCSV(){
  const rows=state.dynamics;
  if(!rows.length){toast("אין נתונים לייצוא","err");return}
  const cols=Object.keys(rows[0]);
  const csv=[cols.join(","), ...rows.map(r=>cols.map(c=>JSON.stringify(r[c]??"")).join(","))].join("\n");
  const blob=new Blob([csv],{type:"text/csv"});
  const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="running_dynamics.csv";a.click();
}
