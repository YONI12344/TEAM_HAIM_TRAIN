<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Team Haim — מערכת אימונים</title>
  <link rel="icon" href="./logo_blue.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>

<div class="app">
  <aside class="sidebar">
    <div class="brand">
      <img src="./logo_blue.png" alt="Team Haim">
      <div class="brand-name">TEAM HAIM</div>
      <div class="brand-sub" id="athleteSidebarName">—</div>
    </div>
    <nav class="nav" id="nav">
      <button data-page="weekly" class="active">שבועי</button>
      <button data-page="season">לוח שנה שלם</button>
      <button data-page="stats">סטטיסטיקות</button>
      <button data-page="goals">מטרות ותחרויות</button>
      <button data-page="profile">פרופיל ספורטאי</button>
      <button data-page="strength">אימוני כוח</button>
      <button data-page="dynamics">נתוני ריצה</button>
    </nav>
  </aside>

  <main class="main">
    <div id="page-weekly" class="page"></div>
    <div id="page-season" class="page" hidden></div>
    <div id="page-stats" class="page" hidden></div>
    <div id="page-goals" class="page" hidden></div>
    <div id="page-profile" class="page" hidden></div>
    <div id="page-strength" class="page" hidden></div>
    <div id="page-dynamics" class="page" hidden></div>
  </main>
</div>

<div id="loader"><div class="spin"></div></div>
<div id="toast"></div>

<script>
/* ────────────────────────────────
   CONFIG (edit per athlete)
   ──────────────────────────────── */
const APPS_SCRIPT_URL = "PASTE_YOUR_APPS_SCRIPT_WEB_APP_URL_HERE";
const ATHLETE_NAME    = "שם הספורטאי";

/* ──────────────────────────────── */
const DAY_NAMES_HE = ["ראשון","שני","שלישי","רביעי","חמישי","שישי","שבת"];
const WORKOUT_TYPES = [
  "ריצה קלה","טמפו","אינטרוולים","ריצה ארוכה","כוח","מנוחה","תחרות","ריצה הררית"
];
const WORKOUT_COLORS = {
  "ריצה קלה":"type-easy",
  "טמפו":"type-tempo",
  "אינטרוולים":"type-intervals",
  "ריצה ארוכה":"type-long",
  "כוח":"type-strength",
  "מנוחה":"type-rest",
  "תחרות":"type-race",
  "ריצה הררית":"type-hills"
};

const state = {
  page:"weekly",
  weekStart:startOfWeek(new Date()),
  weekData:{},
  profile:{},
  races:[],
  goals:[],
  strength:[],
  dynamics:[],
  charts:{}
};

function startOfWeek(d){const x=new Date(d);x.setHours(0,0,0,0);x.setDate(x.getDate()-x.getDay());return x}
function fmtISO(d){return d.toISOString().slice(0,10)}
function fmtHe(d){return d.toLocaleDateString("he-IL",{day:"2-digit",month:"2-digit"})}
function addDays(d,n){const x=new Date(d);x.setDate(x.getDate()+n);return x}
function isoWeekStr(d){
  const t=new Date(Date.UTC(d.getFullYear(),d.getMonth(),d.getDate()));
  const day=t.getUTCDay()||7; t.setUTCDate(t.getUTCDate()+4-day);
  const ys=new Date(Date.UTC(t.getUTCFullYear(),0,1));
  const wn=Math.ceil(((t-ys)/86400000+1)/7);
  return t.getUTCFullYear()+"-W"+String(wn).padStart(2,"0");
}
function $(s,r=document){return r.querySelector(s)}
function $$(s,r=document){return [...r.querySelectorAll(s)]}
function el(tag,attrs={},...kids){
  const e=document.createElement(tag);
  for(const k in attrs){
    if(k==="class")e.className=attrs[k];
    else if(k==="html")e.innerHTML=attrs[k];
    else if(k.startsWith("on"))e.addEventListener(k.slice(2),attrs[k]);
    else if(attrs[k]!==undefined && attrs[k]!==null)e.setAttribute(k,attrs[k]);
  }
  for(const k of kids){if(k==null)continue;e.append(k.nodeType?k:document.createTextNode(k))}
  return e;
}
function toast(msg,type=""){const t=$("#toast");t.textContent=msg;t.className="show "+type;setTimeout(()=>t.className="",2200)}
function showLoader(b){$("#loader").classList.toggle("show",b)}

async function api(action,payload){
  if(!APPS_SCRIPT_URL || APPS_SCRIPT_URL.includes("PASTE_YOUR")){
    console.warn("APPS_SCRIPT_URL not configured — demo mode");
    return demoApi(action,payload);
  }
  showLoader(true);
  try{
    let url=APPS_SCRIPT_URL, opts;
    if(payload){
      opts={method:"POST",body:JSON.stringify({action,data:payload}),
            headers:{"Content-Type":"text/plain;charset=utf-8"}};
    } else {
      const qs=new URLSearchParams({action,...(arguments[2]||{})});
      url+= (url.includes("?")?"&":"?")+qs.toString();
    }
    const r=await fetch(url,opts);
    const j=await r.json();
    if(!j.ok) throw new Error(j.error||"שגיאה לא ידועה");
    return j.data;
  }catch(e){
    console.error(e); toast("שגיאה: "+e.message,"err"); throw e;
  }finally{ showLoader(false) }
}
function apiGet(action,params={}){return api(action,null,params)}
function demoApi(action){
  const empty={Weekly:[],Profile:{},Races:[],Strength:[],Dynamics:[],Goals:[]};
  if(action==="getAll") return Promise.resolve(empty);
  if(action==="getProfile") return Promise.resolve({});
  if(action==="getWeek") return Promise.resolve({});
  return Promise.resolve({ok:true});
}

/* ─────────────────────── routing ─────────────────────── */
$$("#nav button").forEach(b=>b.addEventListener("click",()=>switchPage(b.dataset.page)));
function switchPage(p){
  state.page=p;
  $$("#nav button").forEach(b=>b.classList.toggle("active",b.dataset.page===p));
  $$(".page").forEach(el=>el.hidden=true);
  $("#page-"+p).hidden=false;
  renderPage(p);
}
async function renderPage(p){
  if(p==="weekly")   await renderWeekly();
  if(p==="season")   await renderSeason();
  if(p==="stats")    await renderStats();
  if(p==="goals")    await renderGoals();
  if(p==="profile")  await renderProfile();
  if(p==="strength") await renderStrength();
  if(p==="dynamics") await renderDynamics();
}

/* ─────────────────────── PAGE 1: WEEKLY ─────────────────────── */
async function renderWeekly(){
  const root=$("#page-weekly");
  const wkStr=isoWeekStr(state.weekStart);
  root.innerHTML="";
  root.append(
    el("div",{class:"topbar"},
      el("h1",{html:`תוכנית שבועית — <span class="accent">${ATHLETE_NAME}</span>`}),
      el("div",{class:"row"},
        el("button",{class:"btn ghost sm",onclick:()=>{state.weekStart=addDays(state.weekStart,-7);renderWeekly()}},"◀ שבוע קודם"),
        el("div",{class:"badge"},`שבוע ${wkStr}`),
        el("button",{class:"btn ghost sm",onclick:()=>{state.weekStart=addDays(state.weekStart,7);renderWeekly()}},"שבוע הבא ▶"),
        el("button",{class:"btn",onclick:saveWholeWeek},"שמור הכל")
      )
    )
  );

  let data={};
  try{ data = await apiGet("getWeek",{week:wkStr}) || {}; }catch(e){}
  state.weekData = data || {};

  const wrap=el("div",{class:"weekly"});
  for(let i=0;i<7;i++){
    const date=addDays(state.weekStart,i);
    const iso=fmtISO(date);
    const day = state.weekData[iso] || {};
    wrap.append(buildDayColumn(i,date,iso,day));
  }
  root.append(wrap);
  root.append(buildWeeklySummary());
}

function buildDayColumn(idx,date,iso,day){
  const col=el("div",{class:"day"});
  col.append(el("h4",{},DAY_NAMES_HE[idx], el("span",{class:"date"},fmtHe(date))));

  // Type
  const typeSel=el("select",{},
    el("option",{value:""},"— סוג אימון —"),
    ...WORKOUT_TYPES.map(t=>el("option",{value:t,...(day.type===t?{selected:true}:{})},t))
  );
  typeSel.addEventListener("change",()=>{day.type=typeSel.value;day.builder=day.builder||{};rebuildBuilder()});
  col.append(label("סוג אימון"),typeSel);

  // Simple workout builder
  const builderWrap=el("div",{class:"builder"});
  function rebuildBuilder(){ builderWrap.innerHTML=""; builderWrap.append(buildSimpleBuilder(day)); }
  builderWrap.append(buildSimpleBuilder(day));
  col.append(builderWrap);

  // Actual distance
  const actKm=el("input",{type:"number",step:"0.1",min:"0",placeholder:"0",value:day.actualKm||""});
  actKm.addEventListener("input",()=>{day.actualKm=parseFloat(actKm.value)||0;updateKmBadge()});
  col.append(label("מרחק בפועל (ק\"מ)"),actKm);

  // Feel + RPE
  const feel=el("textarea",{placeholder:"איך הרגשת?"},day.feel||"");
  feel.addEventListener("input",()=>day.feel=feel.value);
  col.append(label("איך הרגשת"),feel);

  const rpe=el("input",{type:"number",min:"1",max:"10",placeholder:"1-10",value:day.actualIntensity||""});
  rpe.addEventListener("input",()=>day.actualIntensity=+rpe.value||0);
  col.append(label("עצימות בפועל"),rpe);

  // KM badge + save
  const km=el("div",{class:"km-badge"},(day.actualKm||0).toFixed(1)+" ק\"מ");
  function updateKmBadge(){km.textContent=(day.actualKm||0).toFixed(1)+" ק\"מ";recalcSummary()}
  col.append(km);
  col.append(el("button",{class:"btn sm",onclick:()=>saveDay(iso,day)},"שמור יום"));

  state.weekData[iso]=day;
  return col;
}

function buildSimpleBuilder(day){
  const b=day.builder=day.builder||{warmup:"",repsCount:6,repTime:"",repPace:"",repRpe:"",sets:1,restRep:"",restSet:"",reps:[]};
  const w=el("div",{class:"card-lite"});

  w.append(label("חימום (דקות)"),inp(b,"warmup","number"));

  // reps
  const repsCount=el("input",{type:"number",min:"1",value:b.repsCount||1});
  repsCount.addEventListener("input",()=>{b.repsCount=+repsCount.value||1;syncReps()});
  w.append(label("מספר חזרות"),repsCount);

  const repTime=inp(b,"repTime","text","זמן חזרה");
  const repPace=inp(b,"repPace","text","טמפו");
  const repRpe=inp(b,"repRpe","number","RPE");
  w.append(label("חזרה בסי��ית (זמן/טמפו/RPE)"),el("div",{class:"row"},repTime,repPace,repRpe));

  const sets=inp(b,"sets","number","סטים");
  const restRep=inp(b,"restRep","text","מנוחה בין חזרות");
  const restSet=inp(b,"restSet","text","מנוחה בין סטים");
  w.append(label("סטים ומנוחות"),el("div",{class:"row"},sets,restRep,restSet));

  // reps list
  const list=el("div",{class:"rep-list"});
  function syncReps(){
    b.reps=b.reps||[];
    while(b.reps.length<b.repsCount) b.reps.push({time:b.repTime||"", pace:b.repPace||"", rpe:b.repRpe||""});
    while(b.reps.length>b.repsCount) b.reps.pop();
    draw();
  }
  function draw(){
    list.innerHTML="";
    b.reps.forEach((r,i)=>{
      const row=el("div",{class:"rep-row"},
        el("div",{class:"rep-label"},"חזרה "+(i+1)),
        repInput(r,"time","זמן"),
        repInput(r,"pace","טמפו"),
        repInput(r,"rpe","RPE")
      );
      list.append(row);
    });
  }
  function repInput(obj,key,ph){
    const i=el("input",{placeholder:ph,value:obj[key]||""});
    i.addEventListener("input",()=>obj[key]=i.value);
    return i;
  }
  syncReps();
  w.append(label("פירוט חזרות"),list);

  return w;
}

function inp(obj,key,type="text",placeholder=""){
  const i=el("input",{type,placeholder,value:obj[key]??""});
  i.addEventListener("input",()=>obj[key]=i.value);
  return i;
}
function label(t){return el("label",{},t)}

function buildWeeklySummary(){
  const wrap=el("div",{class:"weekly-summary"});
  let totalKm=0,sessions=0;
  Object.values(state.weekData).forEach(d=>{
    if(d.actualKm){totalKm+=d.actualKm;sessions++}
  });
  wrap.id="weekSum";
  wrap.append(
    stat(totalKm.toFixed(1),"סה\"כ ק\"מ"),
    stat(sessions,"אימונים")
  );
  return wrap;
}
function stat(v,l){return el("div",{class:"stat"},el("div",{class:"v"},String(v)),el("div",{class:"l"},l))}
function recalcSummary(){
  const ws=$("#weekSum");
  if(ws){const n=buildWeeklySummary();ws.replaceWith(n)}
}
async function saveDay(iso,day){
  await api("saveDay",{date:iso,week:isoWeekStr(new Date(iso)),day});
  toast("נשמר ✓","ok");
}
async function saveWholeWeek(){
  for(const iso in state.weekData){
    await api("saveDay",{date:iso,week:isoWeekStr(state.weekStart),day:state.weekData[iso]});
  }
  toast("השבוע נשמר ✓","ok");
}

/* ─────────────────────── PAGE 2: SEASON (color) ─────────────────────── */
async function renderSeason(){
  const root=$("#page-season");
  root.innerHTML="";
  root.append(el("div",{class:"topbar"},el("h1",{html:`לוח שנה שלם`}),));

  let all={};
  try{ all = await apiGet("getAll") || {Weekly:[]}; }catch(e){ all={Weekly:[]} }
  const byWeek={};
  (all.Weekly||[]).forEach(r=>{
    const wk=r.week||isoWeekStr(new Date(r.date));
    byWeek[wk]=byWeek[wk]||{};
    byWeek[wk][r.date]=r;
  });
  const weeks=Object.keys(byWeek).sort().slice(-26).reverse();
  if(weeks.length===0){
    root.append(el("div",{class:"card"},"אין נתונים בעונה עדיין."));
    return;
  }
  const card=el("div",{class:"card"});
  const tbl=el("table");
  const head=el("thead",{},el("tr",{},
    el("th",{},"שבוע"), el("th",{},"תאריך התחלה"),
    ...DAY_NAMES_HE.map(d=>el("th",{},d)),
    el("th",{},"סה\"כ ק\"מ")
  ));
  const body=el("tbody");

  weeks.forEach(w=>{
    const days=byWeek[w];
    const dayKeys=Object.keys(days).sort();
    const startD=dayKeys[0]||"";
    let total=0;
    const cells=[0,1,2,3,4,5,6].map(di=>{
      const d=Object.values(days).find(x=>new Date(x.date).getDay()===di);
      if(!d) return el("td",{class:"cell type-rest"},"—");
      const km=parseFloat(d.actualKm||0); total+=km;
      const cls=WORKOUT_COLORS[d.type]||"";
      return el("td",{class:"cell "+cls},`${d.type||""} ${km?km.toFixed(1):0}`);
    });
    body.append(el("tr",{},
      el("td",{class:"badge"},w),
      el("td",{},startD),
      ...cells,
      el("td",{html:`<b>${total.toFixed(1)}</b>`})
    ));
  });
  tbl.append(head,body); card.append(tbl); root.append(card);
}

/* ─────────────────────── PAGE 3: STATS ─────────────────────── */
async function renderStats(){
  const root=$("#page-stats");
  root.innerHTML="";
  root.append(el("div",{class:"topbar"},el("h1",{html:`סטטיסטיקות`}),));
  root.append(el("div",{class:"card"},"סטטיסטיקות יוצגו כאן."));
}

/* ─────────────────────── PAGE 4: GOALS + RACES ─────────────────────── */
async function renderGoals(){
  const root=$("#page-goals");
  root.innerHTML="";
  root.append(el("div",{class:"topbar"},
    el("h1",{html:`מטרות ותחרויות`})
  ));

  let data={};
  try{ data=await apiGet("getAll"); }catch(e){data={}}
  state.goals = (data&&data.Goals)||[];
  state.races = (data&&data.Races)||[];

  const gc=el("div",{class:"card"});
  gc.append(el("h3",{},"תחרויות"));
  const tbl=el("table"); tbl.append(el("thead",{},el("tr",{},
    el("th",{},"תאריך"),el("th",{},"שם תחרות"),el("th",{},"מרחק"),el("th",{},"זמן"),el("th",{},"הערות"),el("th",{})
  )));
  const tb=el("tbody");
  state.races.forEach((r,i)=>tb.append(raceRow(r,i)));
  tbl.append(tb); gc.append(tbl);
  gc.append(el("button",{class:"btn sm",onclick:()=>{state.races.push({date:"",name:"",distance:"",time:"",notes:""});renderGoals()}},"+ הוסף תחרות"));
  root.append(gc);
}
function raceRow(r,i){
  function tdInp(k,type="text"){const i=el("input",{type,value:r[k]||""});i.addEventListener("input",()=>r[k]=i.value);return el("td",{},i)}
  return el("tr",{},
    tdInp("date","date"),tdInp("name"),tdInp("distance"),tdInp("time"),tdInp("notes"),
    el("td",{},
      el("button",{class:"btn sm",onclick:async()=>{await api("saveRace",r);toast("נשמר","ok")}},"שמור"),
      " ",
      el("button",{class:"btn sm danger",onclick:()=>{state.races.splice(i,1);renderGoals()}},"✕")
    )
  );
}

/* ─────────────────────── PAGE 5: PROFILE ─────────────────────── */
async function renderProfile(){
  const root=$("#page-profile");
  root.innerHTML="";
  root.append(el("div",{class:"topbar"},el("h1",{html:`פרופיל ספורטאי`}),el("button",{class:"btn",onclick:saveProfile},"שמור פרופיל")));
  let p={}; try{ p=(await apiGet("getProfile"))||{}; }catch(e){}
  state.profile=p;
  const card=el("div",{class:"card"});
  card.append(el("div",{class:"grid-2"},
    field("שם","name",p),
    field("גיל","age",p),
    field("גובה (ס\"מ)","height",p),
    field("משקל (ק\"ג)","weight",p)
  ));
  root.append(card);
}
function field(lbl,k,obj){
  const i=el("input",{value:obj[k]||""}); i.addEventListener("input",()=>obj[k]=i.value);
  return el("div",{},el("label",{},lbl),i);
}
async function saveProfile(){await api("saveProfile",state.profile);toast("פרופיל נשמר ✓","ok")}

/* ─────────────────────── PAGE 6: STRENGTH (blank) ─────────────────────── */
async function renderStrength(){
  const root=$("#page-strength");
  root.innerHTML="";
  root.append(el("div",{class:"topbar"},el("h1",{html:`אימוני כוח`}),));
  root.append(el("div",{class:"card"},"עמוד זה יישאר ריק כרגע."));
}

/* ─────────────────────── PAGE 7: DYNAMICS ─────────────────────── */
async function renderDynamics(){
  const root=$("#page-dynamics");
  root.innerHTML="";
  root.append(el("div",{class:"topbar"},el("h1",{html:`נתוני ריצה`}),));
  root.append(el("div",{class:"card"},"עמוד זה פעיל בהמשך."));
}

/* ─────────────────────── INIT ─────────────────────── */
$("#athleteSidebarName").textContent = ATHLETE_NAME;
document.title = "Team Haim — "+ATHLETE_NAME;
switchPage("weekly");
</script>
</body>
</html>
